<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기록지 초벌 생성기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; line-height: 1.6; max-width: 900px; margin: 0 auto; background: #f0f2f5; color: #333; }
        h1 { color: #072f5f; text-align: center; margin-bottom: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; box-sizing: border-box; font-family: monospace; margin-bottom: 10px; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-hitter { background: #e74c3c; color: white; flex: 1; }
        .btn-pitcher { background: #3498db; color: white; flex: 1; }
        .btn-copy-all { background: #2d3748; color: white; width: 100%; font-size: 18px; margin-bottom: 20px; }
        .btn-clear { background: #cbd5e0; color: #4a5568; font-size: 12px; padding: 4px 8px; }
        
        button:hover { opacity: 0.9; }

        .output-section { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .output-box-container { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; }
        .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 2px solid #edf2f7; padding-bottom: 5px; }
        .output-header span { font-weight: bold; color: #2d3748; }
        .output-content { white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 14px; min-height: 60px; color: #1a202c; }
        
        /* 특이사항 입력 영역 */
        .manual-input { display: flex; gap: 8px; margin-top: 10px; }
        .manual-input input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>⚾ 기록지 초벌 생성기</h1>

    <button class="btn-copy-all" onclick="copyAllContents()">📋 모든 내용 통합 복사 (AI 가공용)</button>
    
    <div class="container">
        <p style="font-size: 0.9em; color: #666;">기록실 데이터를 붙여넣고 해당 버튼을 누르세요. 기록이 아래 박스에 누적됩니다.</p>
        <textarea id="rawData" placeholder="게임원 데이터를 여기에 붙여넣으세요..."></textarea>
        
        <div class="btn-group">
            <button class="btn-hitter" onclick="processHitter()">타자 성적 추가</button>
            <button class="btn-pitcher" onclick="processPitcher()">투수 성적 추가</button>
        </div>

        <div class="manual-input">
            <input type="text" id="defenseInput" placeholder="수비/주루 특이사항 직접 입력 (예: 홍길동 외야 호수비)">
            <button style="background: #48bb78; color: white;" onclick="addDefense()">추가</button>
        </div>
    </div>

    <div class="output-section">
        <div class="output-box-container">
            <div class="output-header">
                <span>[타자 성적]</span>
                <button class="btn-clear" onclick="clearBox('hitterResult')">비우기</button>
            </div>
            <div id="hitterResult" class="output-content"></div>
        </div>

        <div class="output-box-container">
            <div class="output-header">
                <span>[투수 성적]</span>
                <button class="btn-clear" onclick="clearBox('pitcherResult')">비우기</button>
            </div>
            <div id="pitcherResult" class="output-content"></div>
        </div>

        <div class="output-box-container">
            <div class="output-header">
                <span>[수비 및 주루 특이사항]</span>
                <button class="btn-clear" onclick="clearBox('defenseResult')">비우기</button>
            </div>
            <div id="defenseResult" class="output-content"></div>
        </div>
    </div>

    <script>
        function cleanName(str) {
            let name = str.replace(/\(.*\)/g, "");
            name = name.replace(/^[0-9]+[중포一좌우二三유지내외]+/g, "");
            return name.trim();
        }

        function clearBox(id) {
            document.getElementById(id).innerText = "";
        }

        function processHitter() {
            const input = document.getElementById('rawData').value;
            const lines = input.split('\n');
            let currentText = document.getElementById('hitterResult').innerText;

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed || trimmed.includes('선수') || trimmed.includes('합 계')) return;
                const cells = trimmed.split(/\s+/);
                if (cells.length >= 7) {
                    const name = cleanName(cells[0]);
                    const ab = cells[cells.length - 7];
                    const h = cells[cells.length - 6];
                    const rbi = cells[cells.length - 5];
                    const run = cells[cells.length - 4];
                    const sb = cells[cells.length - 3];
                    const bbCount = (line.match(/4구|사구/g) || []).length;

                    currentText += `${name}: ${ab}타수 ${h}안타 ${bbCount}사사구 ${rbi}타점 ${run}득점 ${sb}도루\n`;
                }
            });
            document.getElementById('hitterResult').innerText = currentText.trim();
            document.getElementById('rawData').value = ""; // 입력창 초기화
        }

        function processPitcher() {
            const input = document.getElementById('rawData').value;
            const lines = input.split('\n');
            let currentText = document.getElementById('pitcherResult').innerText;

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed || trimmed.includes('선수') || trimmed.includes('방어율')) return;
                const cells = trimmed.split(/\s+/);
                if (cells.length >= 15) {
                    const name = cells[0].split('(')[0].trim();
                    const ip = cells[2];
                    const bb = cells[9];
                    const hbp = cells[10];
                    const so = cells[11];
                    const r = cells[14];
                    const er = cells[15];
                    const totalBB = Number(bb) + Number(hbp);

                    currentText += `${name}: ${ip}이닝 ${r}실점(${er}자책) ${so}탈삼진 ${totalBB}사사구\n`;
                }
            });
            document.getElementById('pitcherResult').innerText = currentText.trim();
            document.getElementById('rawData').value = "";
        }

        function addDefense() {
            const input = document.getElementById('defenseInput');
            if (!input.value.trim()) return;
            const currentText = document.getElementById('defenseResult').innerText;
            document.getElementById('defenseResult').innerText = (currentText ? currentText + "\n" : "") + "- " + input.value;
            input.value = "";
        }

        function copyAllContents() {
            const h = document.getElementById('hitterResult').innerText;
            const p = document.getElementById('pitcherResult').innerText;
            const d = document.getElementById('defenseResult').innerText;
            
            const combined = `[타자 성적]\n${h}\n\n[투수 성적]\n${p}\n\n[수비/주루 특이사항]\n${d}`;
            
            navigator.clipboard.writeText(combined).then(() => {
                alert("모든 기록이 클립보드에 복사되었습니다. Gemini에 붙여넣으세요!");
            });
        }
    </script>
</body>
</html>
